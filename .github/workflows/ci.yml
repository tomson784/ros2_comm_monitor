name: ROS 2 CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "README.ja.md"
      - "LICENSE"
      - "docs/**"
      - "**/*.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "README.ja.md"
      - "LICENSE"
      - "docs/**"
      - "**/*.md"

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - ros_distro: humble
            container_image: ros:humble-ros-base-jammy
          - ros_distro: jazzy
            container_image: ros:jazzy-ros-base-noble
          - ros_distro: rolling
            container_image: ros:rolling-ros-base-noble

    runs-on: ubuntu-latest
    container:
      image: ${{ matrix.container_image }}

    defaults:
      run:
        shell: bash

    env:
      ROS_DISTRO: ${{ matrix.ros_distro }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install CI tools
        run: |
          set -ex
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            ros-${ROS_DISTRO}-ament-cmake \
            ros-${ROS_DISTRO}-ament-cmake-target-dependencies \
            python3-colcon-common-extensions \
            python3-rosdep
          rm -rf /var/lib/apt/lists/*

      - name: Initialize rosdep
        run: |
          set -ex
          rosdep init || true
          rosdep update --rosdistro "$ROS_DISTRO"

      - name: Install package dependencies
        run: |
          set -ex
          source "/opt/ros/$ROS_DISTRO/setup.bash"
          rosdep install \
            --from-paths . \
            --ignore-src \
            --rosdistro "$ROS_DISTRO" \
            -r -y

      - name: Build
        run: |
          set -ex
          source "/opt/ros/$ROS_DISTRO/setup.bash"
          colcon build --base-paths . --event-handlers console_direct+ --symlink-install

      - name: Test
        run: |
          set -ex
          source "/opt/ros/$ROS_DISTRO/setup.bash"
          source install/setup.bash
          colcon test --event-handlers console_direct+
          colcon test-result --verbose
